<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="login-container">

        <h2>Registro de usuario</h2>

        <form id="registroForm">
            <input type="text" id="regId" placeholder="Numero de identificacion" required>
            <input type="text" id="regNombre" placeholder="Nombre de usuario" required>

        <select id="regCargo" required>
            <option value="">Selecciona un cargo</option>
            <option>Administrador</option>
            <option>Operador</option>
            <option>Supervisor</option>
        </select>

            <input type="password" id="regPass" placeholder="Ingrese su contraseña" required>
            <input type="password" id="regPassConfirn" placeholder="Confirma Contraseña" required>

            <button type="submit">Crear cuenta</button>

            <div id="errorRegistro"></div>
            <div id="exitoRegistro"></div>

        </form>

        <a href="index.html"></a>
        <button type="button">Volver al inicio</button>

        <script src="main.js"></script>

    </div>


</body>
</html>
